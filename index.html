<!DOCTYPE html>
<html>
<head>
  <title>Boxing Arena</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; background:#111; color:white; font-family:sans-serif; overflow:hidden; }
    canvas { display:block; }

    #startScreen, #gameOver {
      position:absolute; top:40%; width:100%; text-align:center;
    }

    button {
      padding:10px 20px; font-size:18px; cursor:pointer;
    }

    #ui {
      position:absolute; top:10px; width:100%;
      display:flex; justify-content:space-around;
    }

    .bar { height:12px; background:#333; width:200px; }
    .bar div { height:100%; background:red; }

    .stamina div { background:yellow; }

    #adBox {
      position:absolute;
      bottom:0;
      width:100%;
      text-align:center;
      background:#222;
      padding:10px;
      font-size:14px;
    }
  </style>
</head>
<body>

<div id="startScreen">
  <h1>🥊 Boxing Arena</h1>
  <button onclick="startGame()">Start Fight</button>
</div>

<div id="ui" style="display:none;">
  <div>
    <div>Pavan</div>
    <div class="bar"><div id="p1Health"></div></div>
    <div class="bar stamina"><div id="p1Stamina"></div></div>
  </div>

  <div>
    <div>Yashas</div>
    <div class="bar"><div id="p2Health"></div></div>
    <div class="bar stamina"><div id="p2Stamina"></div></div>
  </div>
</div>

<canvas id="game"></canvas>

<div id="gameOver" style="display:none;">
  <h2 id="result"></h2>
  <button onclick="location.reload()">Replay</button>
</div>

<div id="adBox">
  🔥 Your Ad Here (Connect AdSense / AdMob later)
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let running = false;

function startGame() {
  document.getElementById("startScreen").style.display="none";
  document.getElementById("ui").style.display="flex";
  running = true;
}

// PLAYER CLASS
class Fighter {
  constructor(x, color) {
    this.x = x;
    this.health = 100;
    this.stamina = 100;
    this.color = color;
  }

  draw() {
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x, canvas.height/2 - 80, 50, 80);
  }

  punch(target, power=5, cost=10) {
    if (this.stamina < cost) return;

    if (Math.abs(this.x - target.x) < 80) {
      target.health -= power;
      this.stamina -= cost;
      shake = 5;
    }
  }

  update() {
    this.stamina = Math.min(100, this.stamina + 0.2);
  }
}

const p1 = new Fighter(200, "cyan");
const p2 = new Fighter(800, "orange");

let keys = {};
document.addEventListener("keydown", e => keys[e.key]=true);
document.addEventListener("keyup", e => keys[e.key]=false);

// SCREEN SHAKE
let shake = 0;

function update() {
  if (!running) return;

  // PLAYER CONTROL
  if (keys["a"]) p1.x -= 5;
  if (keys["d"]) p1.x += 5;

  if (keys["j"]) p1.punch(p2,5,10);
  if (keys["k"]) p1.punch(p2,10,20);

  // AI
  if (p2.x > p1.x) p2.x -= 2;
  else p2.x += 2;

  if (Math.abs(p1.x - p2.x) < 80) {
    if (Math.random()<0.02) p2.punch(p1,5,10);
    if (Math.random()<0.01) p2.punch(p1,10,20);
  }

  p1.update();
  p2.update();

  updateUI();

  if (p1.health <=0 || p2.health<=0) endGame();
}

function draw() {
  ctx.save();

  if (shake>0) {
    ctx.translate(Math.random()*shake, Math.random()*shake);
    shake *=0.9;
  }

  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#333";
  ctx.fillRect(0,canvas.height/2,canvas.width,200);

  p1.draw();
  p2.draw();

  ctx.restore();
}

function updateUI() {
  document.getElementById("p1Health").style.width = p1.health+"%";
  document.getElementById("p2Health").style.width = p2.health+"%";

  document.getElementById("p1Stamina").style.width = p1.stamina+"%";
  document.getElementById("p2Stamina").style.width = p2.stamina+"%";
}

function endGame() {
  running=false;
  document.getElementById("gameOver").style.display="block";
  document.getElementById("result").innerText =
    p1.health>0 ? "🏆 Pavan Wins!" : "🏆 Yashas Wins!";
}

// LOOP
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
