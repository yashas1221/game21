<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love Chase – Web Game</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
}

/* Background */
#game {
  width: 100vw;
  height: 100vh;
  position: relative;
  background: linear-gradient(#87CEEB, #ffffff);
}

/* Characters */
.character {
  position: absolute;
  width: 60px;
  height: 60px;
}

#girl {
  left: 100px;
  top: 200px;
}

#boy {
  right: 100px;
  top: 200px;
}

/* Surprise */
.surprise {
  position: absolute;
  width: 40px;
  height: 40px;
}

/* UI */
#score {
  position: absolute;
  top: 20px;
  left: 20px;
  font-size: 24px;
  font-weight: bold;
}

#gameOver {
  display: none;
  position: absolute;
  top: 40%;
  left: 40%;
  background: white;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}
button {
  padding: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div id="game">

  <!-- UI -->
  <div id="score">Score: 0</div>

  <!-- Girl -->
  <img id="girl" class="character" 
  src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">

  <!-- Boy -->
  <img id="boy" class="character" 
  src="https://cdn-icons-png.flaticon.com/512/4140/4140037.png">

  <!-- Game Over -->
  <div id="gameOver">
    <h2>Game Over</h2>
    <button onclick="restart()">Restart</button>
  </div>

</div>

<script>
let girl = document.getElementById("girl");
let boy = document.getElementById("boy");
let game = document.getElementById("game");
let scoreText = document.getElementById("score");
let gameOverBox = document.getElementById("gameOver");

let score = 0;
let speed = 5;
let keys = {};
let gameRunning = true;

// Controls
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// Move girl
function moveGirl() {
  let top = girl.offsetTop;
  let left = girl.offsetLeft;

  if (keys["ArrowUp"]) girl.style.top = (top - speed) + "px";
  if (keys["ArrowDown"]) girl.style.top = (top + speed) + "px";
  if (keys["ArrowLeft"]) girl.style.left = (left - speed) + "px";
  if (keys["ArrowRight"]) girl.style.left = (left + speed) + "px";
}

// Move boy randomly
function moveBoy() {
  let top = boy.offsetTop;
  boy.style.top = (top + (Math.random() * 6 - 3)) + "px";
}

// Create surprise
function spawnSurprise() {
  let item = document.createElement("img");
  item.src = "https://cdn-icons-png.flaticon.com/512/833/833472.png";
  item.className = "surprise";

  item.style.left = Math.random() * window.innerWidth + "px";
  item.style.top = Math.random() * window.innerHeight + "px";

  game.appendChild(item);

  // Collision
  let interval = setInterval(() => {
    if (!gameRunning) return;

    let g = girl.getBoundingClientRect();
    let s = item.getBoundingClientRect();

    if (
      g.left < s.right &&
      g.right > s.left &&
      g.top < s.bottom &&
      g.bottom > s.top
    ) {
      score++;
      scoreText.innerText = "Score: " + score;
      item.remove();
      clearInterval(interval);
    }
  }, 50);

  // Remove after time
  setTimeout(() => {
    item.remove();
    clearInterval(interval);
  }, 4000);
}

// Game loop
function gameLoop() {
  if (!gameRunning) return;

  moveGirl();
  moveBoy();

  requestAnimationFrame(gameLoop);
}

// Game Over trigger (example)
setTimeout(() => {
  gameRunning = false;
  gameOverBox.style.display = "block";
}, 30000);

// Spawn items
setInterval(spawnSurprise, 1500);

// Restart
function restart() {
  location.reload();
}

// Start
gameLoop();
</script>

</body>
</html>
