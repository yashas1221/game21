<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pavan Mangali: Silence Yashas</title>
<style>
/* ============================================================
   GLOBAL RESET & FONTS
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;900&display=swap');

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --hero:    #38d9ff;
  --villain: #ff4466;
  --gold:    #ffd700;
  --purple:  #b06aff;
  --green:   #22ff88;
  --dark:    #06040f;
  --mid:     #0e0c20;
  --text:    #e8eaff;
}

html, body {
  width:100%; height:100%;
  background:#000;
  overflow:hidden;
  touch-action:none;
  -webkit-tap-highlight-color:transparent;
  font-family:'Nunito',sans-serif;
}

/* ============================================================
   CANVAS WRAPPER — full screen, centered letterbox
   ============================================================ */
#gameWrap {
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
  background:#000;
}

#gameCanvas {
  display:block;
  /* JS will set exact pixel size & CSS scale */
  image-rendering:pixelated;
  image-rendering:-moz-crisp-edges;
}

/* ============================================================
   MOBILE TOUCH CONTROLS (shown only on touch devices or small screen)
   ============================================================ */
#touchControls {
  position:fixed;
  bottom:0; left:0; right:0;
  height:160px;
  display:none;              /* JS shows this on touch */
  pointer-events:none;
  z-index:100;
  padding:10px 16px 20px;
}

/* Left side: dpad */
#dpad {
  position:absolute;
  bottom:22px; left:16px;
  display:flex; gap:6px;
  pointer-events:all;
}

.dpad-btn {
  width:64px; height:64px;
  border-radius:50%;
  background:rgba(56,217,255,0.18);
  border:2px solid rgba(56,217,255,0.45);
  color:var(--hero);
  font-size:26px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  -webkit-user-select:none; user-select:none;
  transition:background 0.1s, transform 0.08s;
  box-shadow:0 0 14px rgba(56,217,255,0.25);
  backdrop-filter:blur(4px);
}
.dpad-btn:active, .dpad-btn.pressed {
  background:rgba(56,217,255,0.38);
  transform:scale(0.92);
  box-shadow:0 0 22px rgba(56,217,255,0.5);
}

/* Right side: action buttons */
#actionBtns {
  position:absolute;
  bottom:22px; right:16px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  pointer-events:all;
}

.action-btn {
  width:68px; height:68px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,0.3);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  cursor:pointer;
  font-size:9px; font-weight:900;
  letter-spacing:0.5px;
  -webkit-user-select:none; user-select:none;
  transition:transform 0.08s, box-shadow 0.1s;
  backdrop-filter:blur(4px);
}
.action-btn:active, .action-btn.pressed { transform:scale(0.88); }
.action-btn .icon { font-size:20px; line-height:1; }

#btnJump   { background:rgba(255,210,0,0.18); border-color:rgba(255,210,0,0.5); color:var(--gold); box-shadow:0 0 14px rgba(255,210,0,0.25); }
#btnJump:active, #btnJump.pressed { box-shadow:0 0 22px rgba(255,210,0,0.5); }
#btnAttack { background:rgba(56,217,255,0.18); border-color:rgba(56,217,255,0.5); color:var(--hero); box-shadow:0 0 14px rgba(56,217,255,0.25); }
#btnAttack:active, #btnAttack.pressed { box-shadow:0 0 22px rgba(56,217,255,0.5); }
#btnMute   { background:rgba(176,106,255,0.18); border-color:rgba(176,106,255,0.5); color:var(--purple); box-shadow:0 0 14px rgba(176,106,255,0.25); }
#btnMute:active, #btnMute.pressed { box-shadow:0 0 22px rgba(176,106,255,0.5); }
#btnDash   { background:rgba(34,255,136,0.18); border-color:rgba(34,255,136,0.5); color:var(--green); box-shadow:0 0 14px rgba(34,255,136,0.25); }
#btnDash:active, #btnDash.pressed { box-shadow:0 0 22px rgba(34,255,136,0.5); }

/* Mobile: make HUD not overlap buttons — canvas pads bottom */
@media (max-width:768px) {
  #touchControls { display:flex; }
}
</style>
</head>
<body>

<!-- Canvas lives here -->
<div id="gameWrap">
  <canvas id="gameCanvas"></canvas>
</div>

<!-- Mobile touch controls (only visible on touch/mobile) -->
<div id="touchControls">
  <!-- Left: movement -->
  <div id="dpad">
    <div class="dpad-btn" id="btnLeft">◀</div>
    <div class="dpad-btn" id="btnRight">▶</div>
  </div>
  <!-- Right: actions -->
  <div id="actionBtns">
    <div class="action-btn" id="btnJump"><span class="icon">⬆</span>JUMP</div>
    <div class="action-btn" id="btnAttack"><span class="icon">👊</span>STRIKE</div>
    <div class="action-btn" id="btnMute"><span class="icon">🔇</span>MUTE</div>
    <div class="action-btn" id="btnDash"><span class="icon">💨</span>DASH</div>
  </div>
</div>

<script>
/* ================================================================
   PAVAN MANGALI: SILENCE YASHAS
   Complete game engine — Mobile + Desktop
   ================================================================
   TABLE OF CONTENTS:
   1.  Canvas Setup & Scaling
   2.  Game Constants & Config
   3.  State Management
   4.  Character Data
   5.  Particle & Effect System
   6.  Input System (Keyboard + Touch)
   7.  Audio System (Web Audio API)
   8.  Character Drawing (Pavan + Yashas)
   9.  Background & World Drawing
   10. HUD Drawing
   11. Screen Drawing (Menu/GameOver/Win)
   12. Game Logic (update)
   13. Collision Detection
   14. Game Loop
   15. Boot & Resize
   ================================================================ */

/* ── 1. CANVAS SETUP & SCALING ─────────────────────────────── */
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

// Logical game resolution — fixed internal size
const GW = 800;   // game world width
const GH = 500;   // game world height (canvas renders to this)
canvas.width  = GW;
canvas.height = GH;

// Fit canvas to screen while preserving aspect ratio
function resizeCanvas() {
  const wrap = document.getElementById('gameWrap');
  const ww = wrap.clientWidth, wh = wrap.clientHeight;
  const touchH = isTouchDevice ? 160 : 0;
  const avail  = wh - touchH;
  const scale  = Math.min(ww/GW, avail/GH);
  canvas.style.width  = Math.floor(GW * scale) + 'px';
  canvas.style.height = Math.floor(GH * scale) + 'px';
}

const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
if (isTouchDevice) document.getElementById('touchControls').style.display = 'flex';
window.addEventListener('resize', resizeCanvas);

/* ── 2. GAME CONSTANTS ─────────────────────────────────────── */
const GROUND   = GH - 90;   // y position of ground surface
const GRAVITY  = 0.50;
const FPS      = 60;

// Difficulty scaling per level
const LEVELS = [
  { noiseRate:0.010, ySpeed:1.4, bInterval:130, bSpeed:3.0, noiseDmg:5,  strikeDmg:14, label:'LEVEL 1' },
  { noiseRate:0.016, ySpeed:1.8, bInterval:100, bSpeed:3.8, noiseDmg:7,  strikeDmg:12, label:'LEVEL 2' },
  { noiseRate:0.022, ySpeed:2.3, bInterval:78,  bSpeed:4.8, noiseDmg:9,  strikeDmg:10, label:'LEVEL 3' },
  { noiseRate:0.030, ySpeed:2.9, bInterval:58,  bSpeed:6.0, noiseDmg:12, strikeDmg:8,  label:'BOSS!!'  },
];

// Yashas funny dialogues
const YASHAS_LINES = [
  'BLA BLA BLA!', 'I LOVE NOISE!!', 'LISTEN TO ME!!',
  'TALK TALK TALK!', 'YOU CAN\'T STOP ME!', 'BLAH BLAH!!',
  'SO LOUD, SO PROUD!', 'VOLUME MAX!!', 'YAKKETY YAK!!',
  'NOISE IS MY POWER!', 'CAN YOU HEAR ME?!', 'MAXIMUM VOLUME!!'
];

/* ── 3. STATE MANAGEMENT ───────────────────────────────────── */
// gameState: 'menu' | 'playing' | 'paused' | 'gameover' | 'win' | 'levelup'
let gameState = 'menu';
let level = 0;            // current level index
let ticks = 0;            // frame counter
let score = 0;
let combo = 0;            // consecutive hits
let comboTimer = 0;
let slowMotion = false;   // slow-mo during mute
let slowMotionT = 0;
let screenShakeX = 0, screenShakeY = 0, screenShakeDecay = 0;
let levelUpTimer = 0;
let lastTime = 0;

/* Player stats */
let health   = 100;       // Pavan health (0-100)
let noise    = 40;        // Yashas noise meter (0-100) – win at 0, lose at 100
let muteCD   = 0;         // mute cooldown ticks
let dashCD   = 0;         // dash cooldown
const MUTE_CD_MAX = 360;
const DASH_CD_MAX = 120;

/* ── 4. CHARACTER DATA ─────────────────────────────────────── */
const P = {  // Pavan Mangali
  x:120, y:GROUND, vx:0, vy:0,
  w:42, h:80,
  onGround:true, facing:1,
  state:'idle',     // idle|walk|jump|strike|dash|mute
  strikeT:0,        // frames remaining in strike animation
  dashT:0,          // dash frames
  muteActive:false, muteDuration:0,
  invincible:0,     // iframes after getting hit
  bobT:0,           // walking bob timer
  attackRange:180,  // px range for strike to connect
  speed:4.2,
  jumpForce:-12.5,
  dashSpeed:14,
};

const Y = {  // Yashas
  x:560, y:GROUND, vx:0, vy:0,
  w:50, h:88,
  onGround:true, facing:-1,
  state:'taunt',    // taunt|walk|shout|hurt|burst
  stateT:80,
  bulletTimer:0,
  burstTimer:0,     // noise burst attack
  blaTimer:0,       // BLA BLA text spam timer
  mouthT:0, mouthOpen:0,
  shakeX:0,         // hit shake
  dialogTimer:0,
  currentDialog:'BLA BLA!',
};

/* Projectiles */
let bullets = [];    // Yashas sound bullets
let blaTexts = [];   // BLA floating text

/* ── 5. PARTICLE & EFFECT SYSTEM ──────────────────────────── */
let particles = [];
let floatingTexts = [];

/**
 * Add a particle to the pool
 * types: spark | ring | wave | bla | number | text
 */
function addFX(opts) { particles.push({ life:1, ...opts }); }

function addFloat(x, y, text, col, size) {
  floatingTexts.push({ x, y, text, col:col||'#fff', size:size||18, life:1, vy:-1.8-Math.random() });
}

function triggerShake(power) {
  screenShakeX = (Math.random()-0.5)*power*2;
  screenShakeY = (Math.random()-0.5)*power;
  screenShakeDecay = power * 1.5;
}

/* Create silence sparks when Pavan strikes */
function silenceSparks(x, y) {
  for (let i=0; i<24; i++) {
    const a = (i/24)*Math.PI*2, s = 3.5+Math.random()*5;
    const cols = ['#38d9ff','#b06aff','#ffffff','#00ffcc','#aaeeff'];
    addFX({ type:'spark', x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
      life:1, r:2.5+Math.random()*3.5, col:cols[i%cols.length] });
  }
  addFX({ type:'ring', x, y, r:10, maxR:140, life:1, col:'#38d9ff' });
  addFX({ type:'ring', x, y, r:10, maxR:80, life:1, col:'#ffffff', delay:8 });
}

/* Mute mode explosion aura */
function muteExplosion(x, y) {
  for (let i=0; i<36; i++) {
    const a=(i/36)*Math.PI*2, s=5+Math.random()*7;
    addFX({ type:'spark', x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
      life:1, r:3+Math.random()*5, col:i%2===0?'#b06aff':'#e0aaff' });
  }
  addFX({ type:'ring', x, y, r:10, maxR:220, life:1, col:'#b06aff' });
  addFX({ type:'ring', x, y, r:10, maxR:140, life:1, col:'#ffffff' });
  triggerShake(12);
}

/* Hit flash on Yashas */
function hitBurst(x, y) {
  for (let i=0; i<14; i++) {
    addFX({ type:'spark', x, y:y-20+(Math.random()-0.5)*50,
      vx:(Math.random()-0.5)*6, vy:-3.5-Math.random()*3,
      life:1, r:3.5, col:'#ffffff' });
  }
  addFX({ type:'ring', x, y, r:8, maxR:60, life:1, col:'#ff4466' });
}

/* Dash trail */
function dashTrail(x, y) {
  addFX({ type:'spark', x, y:y-P.h/2, vx:-P.facing*2, vy:0,
    life:0.7, r:12, col:'rgba(34,255,136,0.4)' });
}

/* ── 6. INPUT SYSTEM ───────────────────────────────────────── */
const keys = {};

// Keyboard
document.addEventListener('keydown', e => {
  const c = e.code;
  keys[c] = true;
  if (['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(c)) e.preventDefault();
  if (gameState === 'menu') { startGame(); return; }
  if (gameState === 'gameover' || gameState === 'win') { if(c==='Space'||c==='Enter') resetToMenu(); return; }
  if (c === 'KeyP' || c === 'Escape') togglePause();
  if (gameState !== 'playing') return;
  if (c==='Space'||c==='ArrowUp'||c==='KeyW') doJump();
  if (c==='KeyF'||c==='KeyZ') doStrike();
  if (c==='KeyM'||c==='KeyX') doMute();
  if (c==='KeyD'||c==='ShiftLeft') doDash();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch button helpers
function setupTouchBtn(id, downFn, upFn) {
  const el = document.getElementById(id);
  if (!el) return;
  const press = e => { e.preventDefault(); el.classList.add('pressed'); if(downFn) downFn(); };
  const release = e => { e.preventDefault(); el.classList.remove('pressed'); if(upFn) upFn(); };
  el.addEventListener('touchstart', press, {passive:false});
  el.addEventListener('touchend', release, {passive:false});
  el.addEventListener('touchcancel', release, {passive:false});
  el.addEventListener('mousedown', press);
  el.addEventListener('mouseup', release);
}

setupTouchBtn('btnLeft',  () => { keys['ArrowLeft']=true;  }, () => { keys['ArrowLeft']=false; });
setupTouchBtn('btnRight', () => { keys['ArrowRight']=true; }, () => { keys['ArrowRight']=false; });
setupTouchBtn('btnJump',  () => { if(gameState==='playing') doJump(); });
setupTouchBtn('btnAttack',() => { if(gameState==='playing') doStrike(); });
setupTouchBtn('btnMute',  () => { if(gameState==='playing') doMute(); });
setupTouchBtn('btnDash',  () => { if(gameState==='playing') doDash(); });

// Tap canvas to start/restart
canvas.addEventListener('click', () => {
  if (gameState==='menu') startGame();
  else if (gameState==='gameover'||gameState==='win') resetToMenu();
});

/* ── 7. AUDIO SYSTEM ─────────────────────────────────────────
   Uses Web Audio API — no external files needed
   ─────────────────────────────────────────────────────────── */
let AudioCtx = null;

function getAudio() {
  if (!AudioCtx) AudioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return AudioCtx;
}

function playTone(freq, type, duration, vol, bend) {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = type||'square';
    osc.frequency.setValueAtTime(freq, ac.currentTime);
    if (bend) osc.frequency.exponentialRampToValueAtTime(bend, ac.currentTime+duration);
    gain.gain.setValueAtTime((vol||0.3)*0.4, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+duration);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime+duration);
  } catch(e) {}
}

function sndStrike()  { playTone(320,'sawtooth',0.12,0.6,80); playTone(600,'square',0.08,0.3); }
function sndHit()     { playTone(180,'square',0.18,0.5,80); }
function sndMute()    { playTone(440,'sine',0.4,0.8,880); playTone(220,'triangle',0.4,0.4,880); }
function sndJump()    { playTone(300,'sine',0.15,0.4,600); }
function sndDash()    { playTone(500,'sawtooth',0.1,0.4,900); }
function sndBla()     { playTone(220,'square',0.08,0.2,120); }
function sndLevelUp() { [440,550,660,880].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.2,0.5),i*80)); }
function sndWin()     { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.3,0.6),i*120)); }
function sndLose()    { [440,330,220,165].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.3,0.5),i*120)); }

/* ── 8. GAME ACTIONS ──────────────────────────────────────── */
function doJump() {
  if (!P.onGround) return;
  P.vy = P.jumpForce; P.onGround = false; P.state='jump';
  sndJump();
  addFX({ type:'ring', x:P.x+P.w/2, y:P.y+P.h, r:5, maxR:45, life:1, col:'#38d9ff' });
}

function doStrike() {
  if (P.strikeT > 0) return;
  P.strikeT = 26; P.state='strike'; score += 1;
  combo++; comboTimer = 90;
  sndStrike();
  const fx = P.x + (P.facing>0 ? P.w+20 : -20);
  const fy = P.y + 22;
  silenceSparks(fx, fy);
  // Check if Yashas is in range
  const dx = Math.abs((P.x + P.w/2) - (Y.x + Y.w/2));
  const dy = Math.abs((P.y + P.h/2) - (Y.y + Y.h/2));
  if (dx < P.attackRange && dy < 100) {
    const dmg = LEVELS[level].strikeDmg * (1 + (combo>4?0.5:combo>2?0.25:0));
    noise = Math.max(0, noise - dmg);
    Y.state = 'hurt'; Y.stateT = 28; Y.shakeX = 9;
    hitBurst(Y.x+Y.w/2, Y.y+30);
    triggerShake(combo > 3 ? 7 : 4);
    addFloat(Y.x+Y.w/2, Y.y-10, combo>4?'COMBO x'+combo+'!!':'HIT!', combo>4?'#ffd700':'#38d9ff', combo>4?24:18);
    sndHit();
    if (noise <= 0) { noise=0; triggerWin(); }
  } else {
    addFloat(P.x + (P.facing>0?P.w+30:-50), P.y, 'MISS', '#888', 14);
    combo = 0;
  }
}

function doMute() {
  if (muteCD > 0) return;
  P.muteActive = true; P.muteDuration = 180; P.state='mute';
  muteCD = MUTE_CD_MAX;
  slowMotion = true; slowMotionT = 60;
  muteExplosion(P.x+P.w/2, P.y+P.h/2);
  sndMute();
  // Drain noise rapidly
  noise = Math.max(0, noise - 28);
  addFloat(GW/2, GH/2-40, '🔇 MUTE MODE!', '#b06aff', 28);
  if (noise <= 0) { noise=0; triggerWin(); }
}

function doDash() {
  if (dashCD > 0) return;
  dashCD = DASH_CD_MAX; P.dashT = 14;
  P.state = 'dash'; P.invincible = 20;
  sndDash();
}

/* ── CHARACTER DRAWING ─────────────────────────────────────── */

/**
 * drawPavan — Anime-style serious focused hero
 * @param {number} px  center-x
 * @param {number} py  bottom-y (feet)
 * @param {number} facing  1=right, -1=left
 * @param {string} state
 * @param {number} strikeT  frames left in strike
 * @param {boolean} muteActive
 * @param {number} invincible  iframes remaining
 */
function drawPavan(px, py, facing, state, strikeT, muteActive, invincible) {
  ctx.save();
  ctx.translate(px, py);
  ctx.scale(facing, 1);
  if (invincible > 0 && Math.floor(ticks/4)%2===0) ctx.globalAlpha = 0.35;

  // Walking bob
  const wb = (state==='walk') ? Math.sin(ticks*0.30)*3.8 : 0;
  const jOff = (state==='jump') ? -5 : wb;
  ctx.translate(0, jOff);

  // ── LEGS ──
  const ls = (state==='walk') ? Math.sin(ticks*0.30)*14 : 0;

  // Back leg
  ctx.save(); ctx.translate(-12,-24); ctx.rotate(ls*Math.PI/180);
  ctx.fillStyle='#152038'; ctx.fillRect(-5,0,11,28);
  ctx.fillStyle='#091420'; ctx.fillRect(-6,22,13,7); // boot
  ctx.fillStyle='#2a3a58'; ctx.fillRect(-5,0,11,3);  // pant stripe
  ctx.restore();

  // Front leg
  ctx.save(); ctx.translate(12,-24); ctx.rotate(-ls*Math.PI/180);
  ctx.fillStyle='#1c2d4a'; ctx.fillRect(-6,0,12,28);
  ctx.fillStyle='#091420'; ctx.fillRect(-7,22,14,7);
  ctx.fillStyle='#3a4a6a'; ctx.fillRect(-6,0,12,3);
  ctx.restore();

  // ── BODY — dark hero jacket ──
  ctx.fillStyle = muteActive ? '#1a0040' : '#0c2244';
  ctx.fillRect(-17,-78,34,54);

  // Jacket glow stripe
  ctx.fillStyle = muteActive ? '#b06aff' : '#38d9ff';
  if (muteActive) { ctx.shadowColor='#b06aff'; ctx.shadowBlur=14; }
  ctx.fillRect(-17,-78,3,54);  // left trim
  ctx.fillRect(14,-78,3,54);   // right trim
  ctx.fillRect(-17,-78,34,3);  // collar
  ctx.shadowBlur=0;

  // Belt
  ctx.fillStyle='#091420'; ctx.fillRect(-17,-26,34,6);
  ctx.fillStyle = muteActive ? '#b06aff' : '#38d9ff';
  ctx.fillRect(-4,-26,8,6);

  // Chest emblem — glowing circle
  ctx.fillStyle = muteActive ? '#b06aff' : '#38d9ff';
  ctx.shadowColor = muteActive ? '#b06aff' : '#38d9ff'; ctx.shadowBlur=10;
  ctx.beginPath(); ctx.arc(0,-52,6,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#000d22';
  ctx.beginPath(); ctx.arc(0,-52,3,0,Math.PI*2); ctx.fill();

  // ── ARMS ──
  const strikeArm = strikeT > 0;
  const dashArm   = state === 'dash';

  // Left arm
  ctx.fillStyle='#0c2244'; ctx.fillRect(-28,-76,13,34);
  ctx.fillStyle='#c07840'; ctx.fillRect(-28,-44,12,10); // hand

  // Right arm (punch extension or normal)
  if (strikeArm) {
    ctx.save(); ctx.translate(17,-74); ctx.rotate(-32*Math.PI/180);
    ctx.fillStyle='#0c2244'; ctx.fillRect(0,0,13,40);
    // Glowing fist
    ctx.fillStyle = muteActive ? '#b06aff' : '#38d9ff';
    ctx.shadowColor = muteActive ? '#b06aff' : '#38d9ff'; ctx.shadowBlur=20;
    ctx.fillRect(0,28,18,14);
    ctx.shadowBlur=0;
    ctx.restore();
  } else if (dashArm) {
    ctx.save(); ctx.translate(17,-74); ctx.rotate(20*Math.PI/180);
    ctx.fillStyle='#0c2244'; ctx.fillRect(0,0,13,30);
    ctx.fillStyle='#c07840'; ctx.fillRect(0,24,12,10);

  } else {
    ctx.fillStyle='#0c2244'; ctx.fillRect(15,-76,13,34);
    ctx.fillStyle='#c07840'; ctx.fillRect(17,-44,12,10);
  }

  // ── NECK ──
  ctx.fillStyle='#c07840'; ctx.fillRect(-5,-82,10,6);

  // ── HEAD ──
  ctx.fillStyle='#c07840'; ctx.fillRect(-15,-120,30,38);
  ctx.fillStyle='#a06030'; ctx.fillRect(-15,-88,30,8); // jaw shadow

  // ── HAIR — dark spiky anime ──
  ctx.fillStyle='#0a0a10';
  ctx.fillRect(-17,-128,34,14);       // base band
  ctx.fillRect(-21,-122,9,8);         // left spike
  ctx.fillRect(12,-124,9,12);         // right spike
  ctx.fillRect(-4,-134,8,10);         // center top spike
  ctx.fillRect(-13,-130,7,8);         // left-mid spike
  ctx.fillRect(6,-128,8,8);           // right-mid spike
  ctx.fillStyle='#1e1e28';
  ctx.fillRect(-8,-128,4,12);         // gloss streak

  // ── EYES — sharp determined anime eyes ──
  ctx.fillStyle='#fff';
  ctx.fillRect(-12,-110,9,8); ctx.fillRect(3,-110,9,8);
  ctx.fillStyle = muteActive ? '#b06aff' : '#38d9ff';
  ctx.fillRect(-9,-108,5,5); ctx.fillRect(5,-108,5,5);
  ctx.fillStyle='#000';
  ctx.fillRect(-8,-107,3,3); ctx.fillRect(6,-107,3,3);
  ctx.fillStyle='#fff'; // glints
  ctx.fillRect(-7,-108,1,1); ctx.fillRect(7,-108,1,1);
  // Eyebrows — stern angled
  ctx.fillStyle='#0a0a10';
  ctx.fillRect(-13,-113,10,3); ctx.fillRect(3,-113,10,3);
  ctx.fillRect(-13,-115,4,2); ctx.fillRect(9,-115,4,2);

  // ── MOUTH — tight serious ──
  ctx.fillStyle='#7a4020'; ctx.fillRect(-5,-98,10,3);

  // Mute aura rings around Pavan
  if (muteActive) {
    ctx.strokeStyle='rgba(176,106,255,0.4)'; ctx.lineWidth=2;
    const pr = 50+12*Math.sin(ticks*0.15);
    ctx.beginPath(); ctx.arc(0,-50,pr,0,Math.PI*2); ctx.stroke();
    const pr2 = 70+8*Math.sin(ticks*0.15+1);
    ctx.strokeStyle='rgba(176,106,255,0.2)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(0,-50,pr2,0,Math.PI*2); ctx.stroke();
  }

  // Dash afterimage
  if (state==='dash') {
    ctx.fillStyle='rgba(34,255,136,0.18)';
    ctx.fillRect(-20,-128,40,130);
  }

  // ── NAME LABEL (below feet) ──
  ctx.scale(1/facing,1); // un-flip text
  ctx.font='900 10px Bangers,cursive';
  ctx.textAlign='center';
  ctx.fillStyle='#38d9ff'; ctx.strokeStyle='#000d22'; ctx.lineWidth=3;
  ctx.shadowColor='#38d9ff'; ctx.shadowBlur=8;
  ctx.strokeText('PAVAN', 0, 20);
  ctx.fillText('PAVAN', 0, 20);
  ctx.shadowBlur=0;

  ctx.restore();
}

/**
 * drawYashas — Loud anime villain with exaggerated expressions
 */
function drawYashas(yx, yy, facing, state, mouthOpen, shakeX) {
  ctx.save();
  ctx.translate(yx + shakeX, yy);
  ctx.scale(facing, 1);

  const hurt  = state === 'hurt';
  const shout = state === 'shout';
  const burst = state === 'burst';

  // Walking animation
  const ls = (state==='walk') ? Math.sin(ticks*0.22)*13 : 0;

  // ── LEGS ──
  ctx.save(); ctx.translate(-12,-26); ctx.rotate(ls*Math.PI/180);
  ctx.fillStyle='#5a2006'; ctx.fillRect(-6,0,12,26);
  ctx.fillStyle='#3a1204'; ctx.fillRect(-7,20,14,7);
  ctx.restore();
  ctx.save(); ctx.translate(12,-26); ctx.rotate(-ls*Math.PI/180);
  ctx.fillStyle='#6e2a0a'; ctx.fillRect(-6,0,12,26);
  ctx.fillStyle='#3a1204'; ctx.fillRect(-7,20,14,7);
  ctx.restore();

  // ── BODY — loud orange-red hoodie ──
  ctx.fillStyle = hurt ? '#5a1000' : burst ? '#ff6600' : '#c43200';
  ctx.fillRect(-20,-84,40,58);

  // Hoodie pocket
  ctx.fillStyle = hurt ? '#480c00' : '#a42800';
  ctx.fillRect(-12,-48,24,20); ctx.fillRect(-12,-48,24,3);

  // Noise lines on chest (not when hurt)
  if (!hurt) {
    ctx.strokeStyle = burst ? '#ffaa00' : '#ff5500';
    ctx.lineWidth = 2;
    for (let i=0;i<3;i++) {
      const off = Math.sin(ticks*0.2+i)*2;
      ctx.beginPath();
      ctx.moveTo(-14+i*14,-79+off); ctx.lineTo(-14+i*14+4,-30+off); ctx.stroke();
    }
  }

  // ── ARMS — flailing expressively ──
  const aw = shout || burst ? Math.sin(ticks*0.3)*24 : hurt ? 30 : Math.sin(ticks*0.1)*8;
  ctx.fillStyle = hurt ? '#5a1000' : '#c43200';
  ctx.save(); ctx.translate(-20,-80); ctx.rotate(-aw*Math.PI/180);
  ctx.fillRect(-11,0,13,36); ctx.fillStyle='#d07040'; ctx.fillRect(-11,28,13,11);
  ctx.restore();
  ctx.save(); ctx.translate(20,-80); ctx.rotate(aw*Math.PI/180);
  ctx.fillRect(-2,0,13,36); ctx.fillStyle='#d07040'; ctx.fillRect(-2,28,13,11);
  ctx.restore();

  // ── NECK ──
  ctx.fillStyle='#d07040'; ctx.fillRect(-6,-92,12,10);

  // ── HEAD ──
  ctx.fillStyle='#d07040'; ctx.fillRect(-19,-136,38,44);
  // Cheek flush — always red
  ctx.fillStyle='rgba(255,80,60,0.42)';
  ctx.beginPath(); ctx.arc(-13,-112,7,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(13,-112,7,0,Math.PI*2); ctx.fill();

  // ── HAIR — messy wild ──
  ctx.fillStyle='#1a0800';
  ctx.fillRect(-21,-144,42,14);    // base
  ctx.fillRect(-25,-138,11,8);     // left
  ctx.fillRect(14,-140,11,10);     // right
  ctx.fillRect(-9,-150,7,10);      // top-left tuft
  ctx.fillRect(2,-152,9,12);       // top-right tuft
  ctx.fillRect(-17,-148,8,8);      // ear lock
  ctx.fillStyle='#3a1800'; ctx.fillRect(-5,-144,7,10); // gloss

  // ── EYES ──
  if (hurt) {
    // Dizzy spiral eyes
    ctx.strokeStyle='#ff4466'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(-9,-126,5,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(-9,-126,2,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(9,-126,5,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(9,-126,2,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='#ff4466';
    ctx.beginPath(); ctx.arc(-9,-126,1,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(9,-126,1,0,Math.PI*2); ctx.fill();
  } else {
    // Wide excited eyes, larger during burst/shout
    const ey = shout||burst ? 12 : 10;
    ctx.fillStyle='#fff';
    ctx.fillRect(-15,-132,ey+1,ey); ctx.fillRect(4,-132,ey+1,ey);
    ctx.fillStyle='#2a1800';
    ctx.fillRect(-12,-130,5,6); ctx.fillRect(7,-130,5,6);
    // glints
    ctx.fillStyle='#fff';
    ctx.fillRect(-11,-130,2,2); ctx.fillRect(8,-130,2,2);
    // Eyebrows — raised (excited)
    ctx.fillStyle='#1a0800';
    ctx.fillRect(-16,-135,12,3); ctx.fillRect(4,-136,12,3);
  }

  // ── MOUTH — animated open ──
  const mh = hurt ? 2 : Math.max(4, mouthOpen * 26);
  const mw = hurt ? 20 : 24 + mouthOpen*4;
  ctx.fillStyle='#1a0000';
  ctx.fillRect(-mw/2,-114,mw,mh);
  // Teeth
  if (!hurt && mouthOpen > 0.25) {
    ctx.fillStyle='#eeeedd';
    ctx.fillRect(-mw/2+1,-114,8,5); ctx.fillRect(-mw/2+10,-114,8,5); ctx.fillRect(-mw/2+20,-114,Math.max(0,mw-22),5);
  }
  // Tongue
  if (mouthOpen > 0.55 && !hurt) {
    ctx.fillStyle='#ff3355'; ctx.fillRect(-7,-108,14,6);
  }

  // Noise lines emanating during shout/burst
  if (shout || burst) {
    ctx.strokeStyle=burst?'rgba(255,150,0,0.5)':'rgba(255,68,102,0.45)'; ctx.lineWidth=2;
    for (let i=0;i<5;i++) {
      const a=(i/5)*Math.PI-Math.PI/2;
      const r1=22, r2=45+Math.sin(ticks*0.2+i)*8;
      ctx.beginPath(); ctx.moveTo(Math.cos(a)*r1,-92+Math.sin(a)*10); ctx.lineTo(Math.cos(a)*r2,-92+Math.sin(a)*30); ctx.stroke();
    }
  }

  // ── YASHAS NAME — always clearly visible above head ──
  ctx.scale(1/facing,1); // un-flip text
  ctx.textAlign='center';

  // Name background pill
  ctx.fillStyle='rgba(255,68,102,0.22)';
  const nw=70, nh=16;
  ctx.fillRect(-nw/2,-165,nw,nh);

  // Name text with glow
  ctx.font='900 16px Bangers,cursive';
  ctx.fillStyle='#ff4466'; ctx.strokeStyle='#220000'; ctx.lineWidth=4;
  ctx.shadowColor='#ff4466'; ctx.shadowBlur=16;
  ctx.strokeText('YASHAS',0,-152);
  ctx.fillText('YASHAS',0,-152);
  ctx.shadowBlur=0;

  // Animated underline
  ctx.strokeStyle='rgba(255,68,102,0.7)'; ctx.lineWidth=2;
  const uw=50+10*Math.sin(ticks*0.12);
  ctx.beginPath(); ctx.moveTo(-uw/2,-147); ctx.lineTo(uw/2,-147); ctx.stroke();

  // Sub-label
  ctx.font='7px Bangers,cursive'; ctx.fillStyle='rgba(255,68,102,0.55)';
  ctx.fillText('THE NOISEMAKER',-0,-138);

  ctx.restore();
}

/* ── 9. BACKGROUND & WORLD ─────────────────────────────────── */
function drawBackground() {
  // Sky gradient
  const sky = ctx.createLinearGradient(0,0,0,GH);
  sky.addColorStop(0,'#05040f'); sky.addColorStop(0.5,'#0c0a20'); sky.addColorStop(1,'#141430');
  ctx.fillStyle=sky; ctx.fillRect(0,0,GW,GH);

  // Stars with twinkle
  ctx.fillStyle='rgba(255,255,255,0.6)';
  const stars=[[80,30],[200,55],[350,18],[480,65],[640,28],[750,50],[860,15],[140,100],[430,88],[720,75],[50,145],[900,130],[300,140],[600,110]];
  stars.forEach(([sx,sy])=>{
    const s=0.3+0.7*((Math.sin(ticks*0.007+sx*0.1)+1)/2);
    ctx.globalAlpha=s;
    ctx.beginPath(); ctx.arc(sx,sy,1.3,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  // City silhouette
  const buildings=[[0,390,90,110],[95,400,65,100],[170,385,100,115],[280,380,75,120],[365,395,90,105],[465,388,55,112],[528,375,120,125],[658,398,65,102],[733,382,85,118],[828,378,100,122]];
  buildings.forEach(([bx,by,bw,bh])=>{
    ctx.fillStyle='rgba(12,8,28,0.88)';
    ctx.fillRect(bx,by,bw,bh);
    // Windows
    for(let wr=0;wr<4;wr++) for(let wc=0;wc<Math.floor(bw/14);wc++){
      const wx=bx+6+wc*14, wy=by+8+wr*18;
      if(Math.sin(wx*2.3+wr*4.1+ticks*0.015)>0.05) {
        ctx.fillStyle=`rgba(255,220,80,${0.2+Math.random()*0.1})`;
        ctx.fillRect(wx,wy,6,8);
      }
    }
  });

  // Ground with glow
  const grd=ctx.createLinearGradient(0,GROUND,0,GH);
  grd.addColorStop(0,'#22206a'); grd.addColorStop(1,'#0d0c30');
  ctx.fillStyle=grd; ctx.fillRect(0,GROUND,GW,GH-GROUND);

  // Ground glow line
  ctx.strokeStyle='rgba(80,80,255,0.7)'; ctx.lineWidth=2;
  ctx.shadowColor='rgba(80,80,255,0.9)'; ctx.shadowBlur=10;
  ctx.beginPath(); ctx.moveTo(0,GROUND); ctx.lineTo(GW,GROUND); ctx.stroke();
  ctx.shadowBlur=0;

  // Perspective lines on ground
  ctx.strokeStyle='rgba(60,60,180,0.12)'; ctx.lineWidth=1;
  for(let gx=0;gx<GW;gx+=70) {
    ctx.beginPath(); ctx.moveTo(gx,GROUND); ctx.lineTo(gx-40,GH); ctx.stroke();
  }
}

/* ── 10. HUD ──────────────────────────────────────────────── */
function drawHUD() {
  const padX=14, padY=10;
  const barW=160, barH=12;

  // ── PAVAN side (left) ──
  // Health bar label
  ctx.font='900 9px Bangers,cursive'; ctx.fillStyle='rgba(56,217,255,0.6)';
  ctx.textAlign='left'; ctx.fillText('PAVAN MANGALI',padX,padY+8);

  // Health bar track
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.strokeStyle='rgba(56,217,255,0.3)'; ctx.lineWidth=1;
  ctx.fillRect(padX,padY+12,barW,barH); ctx.strokeRect(padX,padY+12,barW,barH);

  // Health fill (green→orange→red)
  const hpPct = Math.max(0,Math.min(100,health))/100;
  const hpCol = hpPct>0.5?'#22ff88': hpPct>0.25?'#ffaa00':'#ff2244';
  ctx.fillStyle=hpCol; ctx.shadowColor=hpCol; ctx.shadowBlur=8;
  ctx.fillRect(padX,padY+12,barW*hpPct,barH);
  ctx.shadowBlur=0;
  ctx.font='700 7px Nunito,sans-serif'; ctx.fillStyle='#fff';
  ctx.fillText('HP: '+Math.ceil(health)+'%', padX+barW+5, padY+22);

  // ── YASHAS side (right) ──
  const rx = GW - padX - barW;
  ctx.font='900 9px Bangers,cursive'; ctx.fillStyle='rgba(255,68,102,0.7)';
  ctx.textAlign='right'; ctx.fillText('NOISE METER',GW-padX,padY+8);

  // Noise bar track
  ctx.textAlign='left';
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.strokeStyle='rgba(255,68,102,0.3)';
  ctx.fillRect(rx,padY+12,barW,barH); ctx.strokeRect(rx,padY+12,barW,barH);

  // Noise fill (orange→red, pulsing when high)
  const nPct = Math.max(0,Math.min(100,noise))/100;
  const nFlash = noise>70 && Math.floor(ticks/8)%2===0;
  const nCol = nFlash ? '#ffffff' : (nPct>0.6?'#ff2244':'#ff6600');
  ctx.fillStyle=nCol; ctx.shadowColor=nCol; ctx.shadowBlur=nPct>0.6?12:6;
  ctx.fillRect(rx,padY+12,barW*nPct,barH);
  ctx.shadowBlur=0;
  ctx.font='700 7px Nunito,sans-serif'; ctx.fillStyle='#fff';
  ctx.textAlign='right'; ctx.fillText(Math.ceil(noise)+'%', rx-5, padY+22);

  // ── CENTER — Level badge ──
  ctx.textAlign='center';
  ctx.font='900 11px Bangers,cursive';
  ctx.fillStyle='rgba(255,215,0,0.8)'; ctx.strokeStyle='rgba(0,0,0,0.6)'; ctx.lineWidth=2;
  ctx.shadowColor='#ffd700'; ctx.shadowBlur=6;
  ctx.strokeText(LEVELS[level].label, GW/2, padY+20);
  ctx.fillText(LEVELS[level].label, GW/2, padY+20);
  ctx.shadowBlur=0;

  // Score
  ctx.font='700 8px Nunito,sans-serif'; ctx.fillStyle='rgba(255,255,255,0.45)';
  ctx.fillText('SCORE: '+score, GW/2, padY+34);

  // ── MUTE cooldown bar ──
  if (muteCD > 0) {
    const mpct = 1-(muteCD/MUTE_CD_MAX);
    const bx=GW/2-50, by=GH-36;
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(bx,by,100,6);
    ctx.fillStyle='#b06aff'; ctx.shadowColor='#b06aff'; ctx.shadowBlur=6;
    ctx.fillRect(bx,by,100*mpct,6); ctx.shadowBlur=0;
    ctx.font='6px Bangers,cursive'; ctx.fillStyle='rgba(176,106,255,0.6)';
    ctx.fillText('MUTE CD',GW/2,by-3);
  } else {
    ctx.font='7px Bangers,cursive'; ctx.fillStyle='rgba(176,106,255,0.6)';
    ctx.fillText('🔇 MUTE READY',GW/2,GH-28);
  }

  // ── DASH cooldown ──
  if (dashCD > 0) {
    const dpct = 1-(dashCD/DASH_CD_MAX);
    ctx.font='6px Bangers,cursive'; ctx.fillStyle='rgba(34,255,136,0.5)';
    ctx.fillText('DASH '+(Math.ceil(dashCD/60))+'s', 14, GH-14);
  } else {
    ctx.font='6px Bangers,cursive'; ctx.fillStyle='rgba(34,255,136,0.5)';
    ctx.fillText('DASH READY', 14, GH-14);
  }

  // ── COMBO display ──
  if (combo >= 2) {
    const cAlpha = Math.min(1, comboTimer/30);
    ctx.globalAlpha = cAlpha;
    ctx.font='900 '+(16+combo*2)+'px Bangers,cursive';
    ctx.fillStyle = combo>=5?'#ffd700':combo>=3?'#ff8800':'#ffffff';
    ctx.textAlign='center';
    ctx.shadowColor=ctx.fillStyle; ctx.shadowBlur=16;
    ctx.fillText('COMBO x'+combo+'!!', GW/2, GH/2-80);
    ctx.shadowBlur=0; ctx.globalAlpha=1;
  }

  // Desktop controls hint (small)
  if (!isTouchDevice) {
    ctx.font='600 7px Nunito,sans-serif'; ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.textAlign='center';
    ctx.fillText('A/D=Move  Space=Jump  F=Strike  M=Mute  Shift=Dash  P=Pause', GW/2, GH-8);
  }
}

function drawWin() {

  ctx.font='900 54px Bangers,cursive';
  ctx.fillStyle='#38d9ff'; ctx.strokeStyle='#001122'; ctx.lineWidth=5;
  ctx.shadowColor='#38d9ff'; ctx.shadowBlur=30;
  ctx.strokeText('SILENCED!!', GW/2, GH/2-70);
  ctx.fillText('SILENCED!!', GW/2, GH/2-70);
  ctx.shadowBlur=0;

  ctx.font='700 14px Nunito,sans-serif'; ctx.fillStyle='rgba(255,215,0,0.9)';
  ctx.fillText('Yashas has been silenced! Pavan wins!!', GW/2, GH/2-18);

  ctx.font='700 11px Nunito,sans-serif'; ctx.fillStyle='rgba(255,255,255,0.7)';

  ctx.font='900 15px Bangers,cursive'; ctx.fillStyle='#fff';
  ctx.fillText(isTouchDevice?'TAP TO RETURN':'SPACE / TAP TO RETURN', GW/2, GH/2+60);
  ctx.globalAlpha=1;
}

function drawLevelUp() {
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,GW,GH);
  ctx.textAlign='center';
  const s=Math.min(1,levelUpTimer/20);
  ctx.font=`900 ${Math.floor(38*s)}px Bangers,cursive`;
  ctx.fillStyle='#ffd700'; ctx.shadowColor='#ffd700'; ctx.shadowBlur=22;
  ctx.fillText(LEVELS[level].label+' START!', GW/2, GH/2);
  ctx.shadowBlur=0;
  ctx.font='700 11px Nunito,sans-serif'; ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.fillText('Yashas is getting louder...', GW/2, GH/2+32);
}

/* ── 12. GAME LOGIC (UPDATE) ─────────────────────────────── */
function update() {
  if (gameState !== 'playing' && gameState !== 'levelup') return;

  // Slow motion effect
  if (slowMotion) {
    slowMotionT--;
    if (slowMotionT <= 0) slowMotion = false;
  }
  const dt = slowMotion ? 0.35 : 1;

  ticks++;

  // Level up timer
  if (gameState === 'levelup') {
    levelUpTimer--;
    if (levelUpTimer <= 0) gameState = 'playing';
    return;
  }

  const LVL = LEVELS[level];

  // ── SCREEN SHAKE DECAY ──
  if (screenShakeDecay > 0) {
    screenShakeDecay -= 1.2;
    screenShakeX = (Math.random()-0.5)*screenShakeDecay;
    screenShakeY = (Math.random()-0.5)*screenShakeDecay*0.5;
    if (screenShakeDecay < 0) { screenShakeX=0; screenShakeY=0; screenShakeDecay=0; }
  }

  // ── PAVAN MOVEMENT ──
  let moving = false;
  const left  = keys['ArrowLeft']  || keys['KeyA'];
  const right = keys['ArrowRight'] || keys['KeyD'];

  if (P.state !== 'dash') {
    if (left)  { P.vx = -P.speed; P.facing = -1; moving = true; }
    else if (right) { P.vx = P.speed; P.facing = 1; moving = true; }
    else P.vx *= 0.65;

    // Jump from keyboard
    if ((keys['Space'] || keys['ArrowUp']) && P.onGround) doJump();

    // F key strike
    if (keys['KeyF'] && P.strikeT <= 0) doStrike();

    // M key mute
    if (keys['KeyM'] && muteCD <= 0) doMute();

    // Shift key dash
    if (keys['ShiftLeft'] && dashCD <= 0) doDash();
  }

  // Dash movement
  if (P.dashT > 0) {
    P.vx = P.facing * P.dashSpeed;
    P.dashT--;
    dashTrail(P.x, P.y);
    if (P.dashT <= 0) { P.state='idle'; }
  }

  // Apply gravity
  P.vy = (P.vy + GRAVITY) * dt;
  P.x  += P.vx * dt;
  P.y  += P.vy * dt;

  // Ground collision
  if (P.y >= GROUND) {
    P.y=GROUND; P.vy=0; P.onGround=true;
    if (P.state==='jump') P.state='idle';
  } else P.onGround=false;

  // Wall clamp
  P.x = Math.max(P.w/2, Math.min(GW-P.w/2, P.x));

  // Bob
  P.bobT += dt;

  // State transitions
  if (P.strikeT > 0) { P.strikeT -= dt; P.state='strike'; }
  else if (!moving && P.onGround && P.state!=='mute' && P.state!=='dash') P.state='idle';
  else if (moving && P.onGround && P.state!=='strike' && P.state!=='mute' && P.state!=='dash') P.state='walk';

  // Mute active drain
  if (P.muteActive) {
    P.muteDuration -= dt;
    P.state = 'mute';
    noise = Math.max(0, noise - 0.35*dt);
    if (noise <= 0) { noise=0; triggerWin(); }
    if (P.muteDuration <= 0) { P.muteActive=false; P.state='idle'; }
  }

  // Cooldowns
  if (muteCD > 0) muteCD -= dt;
  if (dashCD > 0) dashCD -= dt;
  if (P.invincible > 0) P.invincible -= dt;

  // Combo decay
  if (comboTimer > 0) { comboTimer -= dt; if(comboTimer<=0){combo=0;} }

  // ── YASHAS AI ──
  Y.shakeX *= 0.72;
  Y.mouthT += 0.18 * dt;
  Y.mouthOpen = (Math.sin(Y.mouthT)+1)/2;
  Y.stateT -= dt;

  if (Y.state === 'hurt') {
    Y.vx = 0;
    if (Y.stateT <= 0) { Y.state='taunt'; Y.stateT=60; }
  } else if (P.muteActive) {
    // Yashas frozen when muted
    Y.vx = 0; Y.state='hurt'; Y.stateT=8;
    Y.shakeX = (Math.random()-0.5)*8;
  } else {
    // Walk toward Pavan
    const dx = (P.x + P.w/2) - (Y.x + Y.w/2);
    Y.facing = dx > 0 ? 1 : -1;
    const dist = Math.abs(dx);

    if (dist > 200) { Y.vx = Y.facing * LVL.ySpeed; Y.state='walk'; }
    else            { Y.vx = Y.facing * LVL.ySpeed * 0.2; Y.state='shout'; }

    // BLA text spam
    Y.blaTimer -= dt;
    if (Y.blaTimer <= 0) {
      spawnBla(Y.x + Y.w/2 + Y.facing*20, Y.y-20);
      Y.blaTimer = 22+Math.random()*32;
    }

    // Dialog quip
    Y.dialogTimer -= dt;
    if (Y.dialogTimer <= 0) {
      Y.currentDialog = YASHAS_LINES[Math.floor(Math.random()*YASHAS_LINES.length)];
      addFloat(Y.x+Y.w/2, Y.y-100, '"'+Y.currentDialog+'"', '#ff4466', 13);
      sndBla();
      Y.dialogTimer = 180+Math.random()*120;
    }

    // Sound bullet fire
    Y.bulletTimer -= dt;
    if (Y.bulletTimer <= 0) {
      Y.bulletTimer = LVL.bInterval;
      fireSoundBullet();
    }

    // Noise burst (area attack) — every 8 seconds
    Y.burstTimer -= dt;
    if (Y.burstTimer <= 0) {
      Y.burstTimer = 480;
      Y.state = 'burst'; Y.stateT = 50;
      noiseBurst();
    }
  }

  // Yashas physics
  Y.vy = (Y.vy + GRAVITY) * dt;
  Y.x += Y.vx * dt; Y.y += Y.vy * dt;
  if (Y.y >= GROUND) { Y.y=GROUND; Y.vy=0; Y.onGnd=true; }
  Y.x = Math.max(10, Math.min(GW-Y.w-10, Y.x));

  // ── BULLETS ──
  bullets.forEach(b => {
    b.x += b.vx * dt; b.y += b.vy * dt; b.life -= 0.008 * dt;
    // Hit Pavan?
    if (!P.muteActive && P.invincible <= 0 && b.active &&
        b.x > P.x && b.x < P.x+P.w && b.y > P.y && b.y < P.y+P.h) {
      b.active = false;
      health = Math.max(0, health - LVL.noiseDmg);
      P.invincible = 40;
      spawnBla(P.x+P.w/2, P.y-10);
      triggerShake(5);
      addFloat(P.x+P.w/2, P.y-30, '-'+LVL.noiseDmg+' HP', '#ff4466', 16);
      if (health <= 0) triggerLose();
    }
  });
  bullets = bullets.filter(b => b.active && b.life > 0 && b.x > -80 && b.x < GW+80);

  // ── BLA TEXTS ──
  blaTexts.forEach(b => { b.x += b.vx*dt; b.y += b.vy*dt; b.life -= 0.018*dt; });
  blaTexts = blaTexts.filter(b => b.life > 0);

  // ── NOISE GROWS OVER TIME ──
  if (!P.muteActive) {
    noise += LVL.noiseRate * dt;
    if (noise >= 100) { noise=100; triggerLose(); }
  }

  // ── LEVEL PROGRESSION ──
  const newLevel = Math.min(LEVELS.length-1, Math.floor(ticks/(60*40))); // every 40s
  if (newLevel > level) {
    level = newLevel;
    gameState = 'levelup'; levelUpTimer = 100;
    sndLevelUp();
    triggerShake(10);
    addFloat(GW/2, GH/2-20, '⚡ '+LEVELS[level].label, '#ffd700', 26);
  }

  // ── PARTICLES ──
  particles.forEach(p => {
    p.life -= 0.025 * dt;
    if (p.delay) { p.delay -= dt; return; }
    if (p.type==='spark') { p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.90; p.vy+=0.25*dt; p.vy*=0.90; }
    if (p.type==='ring')  { p.r = p.maxR*(1-p.life); }
  });
  particles = particles.filter(p => p.life > 0);

  // ── FLOATING TEXTS ──
  floatingTexts.forEach(f => { f.y += f.vy*dt; f.life -= 0.018*dt; });
  floatingTexts = floatingTexts.filter(f => f.life > 0);
}

/* ── 13. SPAWNERS ─────────────────────────────────────────── */
function fireSoundBullet() {
  const LVL = LEVELS[level];
  const bvx = Y.facing * LVL.bSpeed;
  bullets.push({
    x: Y.x + Y.w/2, y: Y.y + 44,
    vx: bvx, vy: (Math.random()-0.5)*0.5,
    r: 14, life: 1, active: true,
    type: 'sound'
  });
  // Second bullet at slight angle for harder levels
  if (level >= 2) {
    bullets.push({ x:Y.x+Y.w/2, y:Y.y+44, vx:bvx*0.85, vy:-2+Math.random()*4, r:10, life:1, active:true, type:'sound' });
  }
}

function noiseBurst() {
  // 3-way burst attack
  for (let i=0;i<5;i++) {
    const a = (i/5)*Math.PI - Math.PI/2 + (Y.facing>0?0:Math.PI);
    const LVL = LEVELS[level];
    bullets.push({
      x: Y.x+Y.w/2, y: Y.y+30,
      vx: Math.cos(a)*LVL.bSpeed*1.2, vy: Math.sin(a)*LVL.bSpeed*0.8,
      r: 16, life: 1, active: true, type:'burst'
    });
  }
  triggerShake(8);
  addFloat(Y.x+Y.w/2, Y.y-60, '💥 NOISE BURST!!', '#ff4466', 20);
}

function spawnBla(x, y) {
  const words = ['BLA!','BLAH!','YAK!','HEY!','LOUD!','NOOO!','TALK!','!!!'];
  const cols  = ['#ff4466','#ff8800','#ffd700','#ff66aa'];
  blaTexts.push({
    x, y: y-(Math.random()*30),
    vx:(Math.random()-0.5)*2.5, vy:-1.8-Math.random()*1.2,
    life:1, text:words[Math.floor(Math.random()*words.length)],
    col:cols[Math.floor(Math.random()*cols.length)],
    size:11+Math.floor(Math.random()*12)
  });
}

/* ── DRAW PARTICLES & BULLETS ────────────────────────────── */
function drawParticles() {
  particles.forEach(p => {
    if (p.delay && p.delay > 0) return;
    ctx.save(); ctx.globalAlpha = p.life;
    if (p.type==='spark') {
      ctx.fillStyle=p.col; ctx.shadowColor=p.col; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
    }
    if (p.type==='ring') {
      ctx.strokeStyle=p.col; ctx.lineWidth=3*(p.life); ctx.shadowColor=p.col; ctx.shadowBlur=12;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.stroke();
    }
    ctx.shadowBlur=0; ctx.restore();
  });
}

function drawBullets() {
  bullets.forEach(b => {
    if (!b.active) return;
    ctx.save(); ctx.globalAlpha=b.life;
    const pulse=1+0.25*Math.sin(ticks*0.35);
    const isBurst=b.type==='burst';
    const bg=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r*pulse);
    bg.addColorStop(0,'rgba(255,255,255,0.95)');
    bg.addColorStop(0.3,isBurst?'rgba(255,150,0,0.9)':'rgba(255,68,102,0.9)');
    bg.addColorStop(1,'rgba(255,68,102,0)');
    ctx.fillStyle=bg; ctx.shadowColor=isBurst?'#ff9900':'#ff4466'; ctx.shadowBlur=18;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r*pulse,0,Math.PI*2); ctx.fill();
    // "!" inside
    ctx.shadowBlur=0; ctx.fillStyle='#fff';
    ctx.font='bold '+(isBurst?'14px':'11px')+' Bangers,cursive';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(isBurst?'!!':'!',b.x,b.y);
    ctx.textBaseline='alphabetic';
    ctx.restore();
  });
}

function drawBlaTexts() {
  blaTexts.forEach(b => {
    ctx.save(); ctx.globalAlpha=b.life;
    ctx.font='900 '+b.size+'px Bangers,cursive';
    ctx.textAlign='center'; ctx.fillStyle=b.col; ctx.strokeStyle='rgba(0,0,0,0.8)'; ctx.lineWidth=2;
    ctx.shadowColor=b.col; ctx.shadowBlur=8;
    ctx.strokeText(b.text,b.x,b.y); ctx.fillText(b.text,b.x,b.y);
    ctx.shadowBlur=0; ctx.restore();
  });
}

function drawFloatingTexts() {
  floatingTexts.forEach(f => {
    ctx.save(); ctx.globalAlpha=f.life;
    ctx.font='900 '+f.size+'px Bangers,cursive';
    ctx.textAlign='center'; ctx.fillStyle=f.col; ctx.strokeStyle='#000'; ctx.lineWidth=3;
    ctx.shadowColor=f.col; ctx.shadowBlur=10;
    ctx.strokeText(f.text,f.x,f.y); ctx.fillText(f.text,f.x,f.y);
    ctx.shadowBlur=0; ctx.restore();
  });
}

/* ── MUTE AURA AROUND PAVAN ─────────────────────────────── */
function drawMuteAura() {
  if (!P.muteActive) return;
  const cx=P.x+P.w/2-P.w/2, cy=P.y-P.h/2;
  const pulse=1+0.18*Math.sin(ticks*0.2);
  const ag=ctx.createRadialGradient(cx,cy,15,cx,cy,130*pulse);
  ag.addColorStop(0,'rgba(176,106,255,0.18)');
  ag.addColorStop(0.6,'rgba(176,106,255,0.07)');
  ag.addColorStop(1,'transparent');
  ctx.fillStyle=ag; ctx.beginPath(); ctx.arc(cx,cy,130*pulse,0,Math.PI*2); ctx.fill();
  // Orbiting glyphs
  for(let i=0;i<6;i++){
    const a=(i/6)*Math.PI*2+ticks*0.045;
    ctx.save(); ctx.globalAlpha=0.7;
    ctx.font='14px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🔇',cx+Math.cos(a)*95,cy+Math.sin(a)*95);
    ctx.restore();
  }
}

/* ── SLOW MO OVERLAY ───────────────────────────────────────*/
function drawSlowMoOverlay() {
  if (!slowMotion) return;
  ctx.fillStyle='rgba(176,106,255,0.06)';
  ctx.fillRect(0,0,GW,GH);
  ctx.font='700 9px Nunito,sans-serif'; ctx.fillStyle='rgba(176,106,255,0.6)';
  ctx.textAlign='center'; ctx.fillText('— SLOW MOTION —',GW/2,22);
}

/* ── 14. GAME LOOP ────────────────────────────────────────── */
function frame(ts) {
  requestAnimationFrame(frame);

  ctx.save();

  // Screen shake translate
  if (screenShakeX || screenShakeY) ctx.translate(screenShakeX, screenShakeY);

  if (gameState === 'menu') {
    ticks++;
    drawMenu();
    // Animate Yashas mouth on menu
    Y.mouthT += 0.18;
    Y.mouthOpen = (Math.sin(Y.mouthT)+1)/2;
  }
  else if (gameState === 'playing' || gameState === 'levelup') {
    update();
    drawBackground();
    drawParticles();   // rings behind characters
    drawBullets();
    drawYashas(Y.x+Y.w/2, Y.y+Y.h, Y.facing, Y.state, Y.mouthOpen, Y.shakeX);
    drawPavan(P.x+P.w/2, P.y+P.h, P.facing, P.state, P.strikeT, P.muteActive, P.invincible);
    drawMuteAura();
    drawParticles();   // sparks in front
    drawBlaTexts();
    drawFloatingTexts();
    drawSlowMoOverlay();
    drawHUD();
    if (gameState === 'levelup') drawLevelUp();
  }
  else if (gameState === 'gameover') {
    ticks++;
    drawBackground();
    drawGameOver();
  }
  else if (gameState === 'win') {
    ticks++;
    drawBackground();
    drawWin();
    drawParticles(); // win fireworks
    drawFloatingTexts();
  }
  else if (gameState === 'paused') {
    // Draw game frozen behind pause
    drawBackground();
    drawBullets();
    drawYashas(Y.x+Y.w/2, Y.y+Y.h, Y.facing, Y.state, Y.mouthOpen, Y.shakeX);
    drawPavan(P.x+P.w/2, P.y+P.h, P.facing, P.state, P.strikeT, P.muteActive, P.invincible);
    drawHUD();
    // Pause overlay
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,GW,GH);
    ctx.textAlign='center';
    ctx.font='900 44px Bangers,cursive'; ctx.fillStyle='#fff';
    ctx.shadowColor='#38d9ff'; ctx.shadowBlur=16;
    ctx.fillText('PAUSED',GW/2,GH/2-20); ctx.shadowBlur=0;
    ctx.font='700 12px Nunito,sans-serif'; ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.fillText('Press P / Escape to resume',GW/2,GH/2+20);
  }

  ctx.restore();
}

/* ── 15. GAME MANAGEMENT ─────────────────────────────────── */
function startGame() {
  // Reset all state
  health=100; noise=40; score=0; combo=0; comboTimer=0;
  muteCD=0; dashCD=0; level=0; ticks=0;
  slowMotion=false; slowMotionT=0;
  screenShakeX=0; screenShakeY=0; screenShakeDecay=0;
  particles=[]; bullets=[]; blaTexts=[]; floatingTexts=[];

  // Reset Pavan
  P.x=120; P.y=GROUND; P.vx=0; P.vy=0; P.onGround=true;
  P.facing=1; P.state='idle'; P.strikeT=0; P.dashT=0;
  P.muteActive=false; P.muteDuration=0; P.invincible=0; P.bobT=0;

  // Reset Yashas
  Y.x=560; Y.y=GROUND; Y.vx=0; Y.vy=0; Y.onGnd=true;
  Y.facing=-1; Y.state='taunt'; Y.stateT=80;
  Y.bulletTimer=LEVELS[0].bInterval; Y.burstTimer=480;
  Y.mouthT=0; Y.mouthOpen=0; Y.blaT=0; Y.shakeX=0;
  Y.dialogTimer=90; Y.currentDialog='BLA BLA!';

  getAudio(); // unlock audio
  gameState='playing';
}

function triggerWin() {
  gameState='win';
  sndWin();
  triggerShake(10);
  // Win fireworks
  for(let i=0;i<60;i++){
    const a=Math.random()*Math.PI*2, s=4+Math.random()*8;
    const cols=['#38d9ff','#ffd700','#22ff88','#b06aff','#fff','#ff4466'];
    addFX({ type:'spark', x:GW/2+(Math.random()-0.5)*400, y:GH/2+(Math.random()-0.5)*200,
      vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:1, r:3+Math.random()*5,
      col:cols[Math.floor(Math.random()*cols.length)] });
  }
}

function triggerLose() {
  gameState='gameover';
  sndLose();
  triggerShake(18);
}

function resetToMenu() {
  gameState='menu';
  ticks=0; particles=[]; bullets=[]; blaTexts=[]; floatingTexts=[];
  Y.mouthT=0;
}

function togglePause() {
  if (gameState==='playing')   gameState='paused';
  else if (gameState==='paused') gameState='playing';
}

/* ── BOOT ──────────────────────────────────────────────────*/
resizeCanvas();
requestAnimationFrame(frame);
</script>
