<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pavan Mangali: Silence Yashas</title>
<style>
/* ============================================================
   GLOBAL RESET & FONTS
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;900&display=swap');

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --hero:    #38d9ff;
  --villain: #ff4466;
  --gold:    #ffd700;
  --purple:  #b06aff;
  --green:   #22ff88;
  --dark:    #06040f;
  --mid:     #0e0c20;
  --text:    #e8eaff;
}

html, body {
  width:100%; height:100%;
  background:#000;
  overflow:hidden;
  touch-action:none;
  -webkit-tap-highlight-color:transparent;
  font-family:'Nunito',sans-serif;
}

/* ============================================================
   CANVAS WRAPPER \u2014 full screen, centered letterbox
   ============================================================ */
#gameWrap {
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
  background:#000;
}

#gameCanvas {
  display:block;
  /* JS will set exact pixel size & CSS scale */
  image-rendering:pixelated;
  image-rendering:-moz-crisp-edges;
}

/* ============================================================
   MOBILE TOUCH CONTROLS (shown only on touch devices or small screen)
   ============================================================ */
#touchControls {
  position:fixed;
  bottom:0; left:0; right:0;
  height:160px;
  display:none;              /* JS shows this on touch */
  pointer-events:none;
  z-index:100;
  padding:10px 16px 20px;
}

/* Left side: dpad */
#dpad {
  position:absolute;
  bottom:22px; left:16px;
  display:flex; gap:6px;
  pointer-events:all;
}

.dpad-btn {
  width:64px; height:64px;
  border-radius:50%;
  background:rgba(56,217,255,0.18);
  border:2px solid rgba(56,217,255,0.45);
  color:var(--hero);
  font-size:26px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  -webkit-user-select:none; user-select:none;
  transition:background 0.1s, transform 0.08s;
  box-shadow:0 0 14px rgba(56,217,255,0.25);
  backdrop-filter:blur(4px);
}
.dpad-btn:active, .dpad-btn.pressed {
  background:rgba(56,217,255,0.38);
  transform:scale(0.92);
  box-shadow:0 0 22px rgba(56,217,255,0.5);
}

/* Right side: action buttons */
#actionBtns {
  position:absolute;
  bottom:22px; right:16px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  pointer-events:all;
}

.action-btn {
  width:68px; height:68px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,0.3);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  cursor:pointer;
  font-size:9px; font-weight:900;
  letter-spacing:0.5px;
  -webkit-user-select:none; user-select:none;
  transition:transform 0.08s, box-shadow 0.1s;
  backdrop-filter:blur(4px);
}
.action-btn:active, .action-btn.pressed { transform:scale(0.88); }
.action-btn .icon { font-size:20px; line-height:1; }

#btnJump   { background:rgba(255,210,0,0.18); border-color:rgba(255,210,0,0.5); color:var(--gold); box-shadow:0 0 14px rgba(255,210,0,0.25); }
#btnJump:active, #btnJump.pressed { box-shadow:0 0 22px rgba(255,210,0,0.5); }
#btnAttack { background:rgba(56,217,255,0.18); border-color:rgba(56,217,255,0.5); color:var(--hero); box-shadow:0 0 14px rgba(56,217,255,0.25); }
#btnAttack:active, #btnAttack.pressed { box-shadow:0 0 22px rgba(56,217,255,0.5); }
#btnMute   { background:rgba(176,106,255,0.18); border-color:rgba(176,106,255,0.5); color:var(--purple); box-shadow:0 0 14px rgba(176,106,255,0.25); }
#btnMute:active, #btnMute.pressed { box-shadow:0 0 22px rgba(176,106,255,0.5); }
#btnDash   { background:rgba(34,255,136,0.18); border-color:rgba(34,255,136,0.5); color:var(--green); box-shadow:0 0 14px rgba(34,255,136,0.25); }
#btnDash:active, #btnDash.pressed { box-shadow:0 0 22px rgba(34,255,136,0.5); }

/* Mobile: make HUD not overlap buttons \u2014 canvas pads bottom */
@media (max-width:768px) {
  #touchControls { display:flex; }
}
</style>
</head>
<body>

<!-- Canvas lives here -->
<div id="gameWrap">
  <canvas id="gameCanvas"></canvas>
</div>

<!-- Mobile touch controls (only visible on touch/mobile) -->
<div id="touchControls">
  <!-- Left: movement -->
  <div id="dpad">
    <div class="dpad-btn" id="btnLeft">\u25c0</div>
    <div class="dpad-btn" id="btnRight">\u25b6</div>
  </div>
  <!-- Right: actions -->
  <div id="actionBtns">
    <div class="action-btn" id="btnJump"><span class="icon">\u2b06</span>JUMP</div>
    <div class="action-btn" id="btnAttack"><span class="icon">\ud83d\udc4a</span>STRIKE</div>
    <div class="action-btn" id="btnMute"><span class="icon">\ud83d\udd07</span>MUTE</div>
    <div class="action-btn" id="btnDash"><span class="icon">\ud83d\udca8</span>DASH</div>
  </div>
</div>

<script>
/* ================================================================
   PAVAN MANGALI: SILENCE YASHAS
   Complete game engine \u2014 Mobile + Desktop
   ================================================================
   TABLE OF CONTENTS:
   1.  Canvas Setup & Scaling
   2.  Game Constants & Config
   3.  State Management
   4.  Character Data
   5.  Particle & Effect System
   6.  Input System (Keyboard + Touch)
   7.  Audio System (Web Audio API)
   8.  Character Drawing (Pavan + Yashas)
   9.  Background & World Drawing
   10. HUD Drawing
   11. Screen Drawing (Menu/GameOver/Win)
   12. Game Logic (update)
   13. Collision Detection
   14. Game Loop
   15. Boot & Resize
   ================================================================ */

/* \u2500\u2500 1. CANVAS SETUP & SCALING \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

// Logical game resolution \u2014 fixed internal size
const GW = 800;   // game world width
const GH = 500;   // game world height (canvas renders to this)
canvas.width  = GW;
canvas.height = GH;

// Fit canvas to screen while preserving aspect ratio
function resizeCanvas() {
  const wrap = document.getElementById('gameWrap');
  const ww = wrap.clientWidth, wh = wrap.clientHeight;
  const touchH = isTouchDevice ? 160 : 0;
  const avail  = wh - touchH;
  const scale  = Math.min(ww/GW, avail/GH);
  canvas.style.width  = Math.floor(GW * scale) + 'px';
  canvas.style.height = Math.floor(GH * scale) + 'px';
}

const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
if (isTouchDevice) document.getElementById('touchControls').style.display = 'flex';
window.addEventListener('resize', resizeCanvas);

/* \u2500\u2500 2. GAME CONSTANTS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
const GROUND   = GH - 90;   // y position of ground surface
const GRAVITY  = 0.50;
const FPS      = 60;

// Difficulty scaling per level
const LEVELS = [
  { noiseRate:0.010, ySpeed:1.4, bInterval:130, bSpeed:3.0, noiseDmg:5,  strikeDmg:14, label:'LEVEL 1' },
  { noiseRate:0.016, ySpeed:1.8, bInterval:100, bSpeed:3.8, noiseDmg:7,  strikeDmg:12, label:'LEVEL 2' },
  { noiseRate:0.022, ySpeed:2.3, bInterval:78,  bSpeed:4.8, noiseDmg:9,  strikeDmg:10, label:'LEVEL 3' },
  { noiseRate:0.030, ySpeed:2.9, bInterval:58,  bSpeed:6.0, noiseDmg:12, strikeDmg:8,  label:'BOSS!!'  },
];

// Yashas funny dialogues
const YASHAS_LINES = [
  'BLA BLA BLA!', 'I LOVE NOISE!!', 'LISTEN TO ME!!',
  'TALK TALK TALK!', 'YOU CAN\'T STOP ME!', 'BLAH BLAH!!',
  'SO LOUD, SO PROUD!', 'VOLUME MAX!!', 'YAKKETY YAK!!',
  'NOISE IS MY POWER!', 'CAN YOU HEAR ME?!', 'MAXIMUM VOLUME!!'
];

/* \u2500\u2500 3. STATE MANAGEMENT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
// gameState: 'menu' | 'playing' | 'paused' | 'gameover' | 'win' | 'levelup'
let gameState = 'menu';
let level = 0;            // current level index
let ticks = 0;            // frame counter
let score = 0;
let combo = 0;            // consecutive hits
let comboTimer = 0;
let slowMotion = false;   // slow-mo during mute
let slowMotionT = 0;
let screenShakeX = 0, screenShakeY = 0, screenShakeDecay = 0;
let levelUpTimer = 0;
let lastTime = 0;

/* Player stats */
let health   = 100;       // Pavan health (0-100)
let noise    = 40;        // Yashas noise meter (0-100) \u2013 win at 0, lose at 100
let muteCD   = 0;         // mute cooldown ticks
let dashCD   = 0;         // dash cooldown
const MUTE_CD_MAX = 360;
const DASH_CD_MAX = 120;

/* \u2500\u2500 4. CHARACTER DATA \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
const P = {  // Pavan Mangali
  x:120, y:GROUND, vx:0, vy:0,
  w:42, h:80,
  onGround:true, facing:1,
  state:'idle',     // idle|walk|jump|strike|dash|mute
  strikeT:0,        // frames remaining in strike animation
  dashT:0,          // dash frames
  muteActive:false, muteDuration:0,
  invincible:0,     // iframes after getting hit
  bobT:0,           // walking bob timer
  attackRange:180,  // px range for strike to connect
  speed:4.2,
  jumpForce:-12.5,
  dashSpeed:14,
};

const Y = {  // Yashas
  x:560, y:GROUND, vx:0, vy:0,
  w:50, h:88,
  onGround:true, facing:-1,
  state:'taunt',    // taunt|walk|shout|hurt|burst
  stateT:80,
  bulletTimer:0,
  burstTimer:0,     // noise burst attack
  blaTimer:0,       // BLA BLA text spam timer
  mouthT:0, mouthOpen:0,
  shakeX:0,         // hit shake
  dialogTimer:0,
  currentDialog:'BLA BLA!',
};

/* Projectiles */
let bullets = [];    // Yashas sound bullets
let blaTexts = [];   // BLA floating text

/* \u2500\u2500 5. PARTICLE & EFFECT SYSTEM \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
let particles = [];
let floatingTexts = [];

/**
 * Add a particle to the pool
 * types: spark | ring | wave | bla | number | text
 */
function addFX(opts) { particles.push({ life:1, ...opts }); }

function addFloat(x, y, text, col, size) {
  floatingTexts.push({ x, y, text, col:col||'#fff', size:size||18, life:1, vy:-1.8-Math.random() });
}

function triggerShake(power) {
  screenShakeX = (Math.random()-0.5)*power*2;
  screenShakeY = (Math.random()-0.5)*power;
  screenShakeDecay = power * 1.5;
}

/* Create silence sparks when Pavan strikes */
function silenceSparks(x, y) {
  for (let i=0; i<24; i++) {
    const a = (i/24)*Math.PI*2, s = 3.5+Math.random()*5;
    const cols = ['#38d9ff','#b06aff','#ffffff','#00ffcc','#aaeeff'];
    addFX({ type:'spark', x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
      life:1, r:2.5+Math.random()*3.5, col:cols[i%cols.length] });
  }
  addFX({ type:'ring', x, y, r:10, maxR:140, life:1, col:'#38d9ff' });
  addFX({ type:'ring', x, y, r:10, maxR:80, life:1, col:'#ffffff', delay:8 });
}

/* Mute mode explosion aura */
function muteExplosion(x, y) {
  for (let i=0; i<36; i++) {
    const a=(i/36)*Math.PI*2, s=5+Math.random()*7;
    addFX({ type:'spark', x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
      life:1, r:3+Math.random()*5, col:i%2===0?'#b06aff':'#e0aaff' });
  }
  addFX({ type:'ring', x, y, r:10, maxR:220, life:1, col:'#b06aff' });
  addFX({ type:'ring', x, y, r:10, maxR:140, life:1, col:'#ffffff' });
  triggerShake(12);
}

/* Hit flash on Yashas */
function hitBurst(x, y) {
  for (let i=0; i<14; i++) {
    addFX({ type:'spark', x, y:y-20+(Math.random()-0.5)*50,
      vx:(Math.random()-0.5)*6, vy:-3.5-Math.random()*3,
      life:1, r:3.5, col:'#ffffff' });
  }
  addFX({ type:'ring', x, y, r:8, maxR:60, life:1, col:'#ff4466' });
}

/* Dash trail */
function dashTrail(x, y) {
  addFX({ type:'spark', x, y:y-P.h/2, vx:-P.facing*2, vy:0,
    life:0.7, r:12, col:'rgba(34,255,136,0.4)' });
}

/* \u2500\u2500 6. INPUT SYSTEM \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
const keys = {};

// Keyboard
document.addEventListener('keydown', e => {
  const c = e.code;
  keys[c] = true;
  if (['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(c)) e.preventDefault();
  if (gameState === 'menu') { startGame(); return; }
  if (gameState === 'gameover' || gameState === 'win') { if(c==='Space'||c==='Enter') resetToMenu(); return; }
  if (c === 'KeyP' || c === 'Escape') togglePause();
  if (gameState !== 'playing') return;
  if (c==='Space'||c==='ArrowUp'||c==='KeyW') doJump();
  if (c==='KeyF'||c==='KeyZ') doStrike();
  if (c==='KeyM'||c==='KeyX') doMute();
  if (c==='KeyD'||c==='ShiftLeft') doDash();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch button helpers
function setupTouchBtn(id, downFn, upFn) {
  const el = document.getElementById(id);
  if (!el) return;
  const press = e => { e.preventDefault(); el.classList.add('pressed'); if(downFn) downFn(); };
  const release = e => { e.preventDefault(); el.classList.remove('pressed'); if(upFn) upFn(); };
  el.addEventListener('touchstart', press, {passive:false});
  el.addEventListener('touchend', release, {passive:false});
  el.addEventListener('touchcancel', release, {passive:false});
  el.addEventListener('mousedown', press);
  el.addEventListener('mouseup', release);
}

setupTouchBtn('btnLeft',  () => { keys['ArrowLeft']=true;  }, () => { keys['ArrowLeft']=false; });
setupTouchBtn('btnRight', () => { keys['ArrowRight']=true; }, () => { keys['ArrowRight']=false; });
setupTouchBtn('btnJump',  () => { if(gameState==='playing') doJump(); });
setupTouchBtn('btnAttack',() => { if(gameState==='playing') doStrike(); });
setupTouchBtn('btnMute',  () => { if(gameState==='playing') doMute(); });
setupTouchBtn('btnDash',  () => { if(gameState==='playing') doDash(); });

// Tap canvas to start/restart
canvas.addEventListener('click', () => {
  if (gameState==='menu') startGame();
  else if (gameState==='gameover'||gameState==='win') resetToMenu();
});

/* \u2500\u2500 7. AUDIO SYSTEM \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
   Uses Web Audio API \u2014 no external files needed
   \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
let AudioCtx = null;

function getAudio() {
  if (!AudioCtx) AudioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return AudioCtx;
}

function playTone(freq, type, duration, vol, bend) {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = type||'square';
    osc.frequency.setValueAtTime(freq, ac.currentTime);
    if (bend) osc.frequency.exponentialRampToValueAtTime(bend, ac.currentTime+duration);
    gain.gain.setValueAtTime((vol||0.3)*0.4, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+duration);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime+duration);
  } catch(e) {}
}

function sndStrike()  { playTone(320,'sawtooth',0.12,0.6,80); playTone(600,'square',0.08,0.3); }
function sndHit()     { playTone(180,'square',0.18,0.5,80); }
function sndMute()    { playTone(440,'sine',0.4,0.8,880); playTone(220,'triangle',0.4,0.4,880); }
function sndJump()    { playTone(300,'sine',0.15,0.4,600); }
function sndDash()    { playTone(500,'sawtooth',0.1,0.4,900); }
function sndBla()     { playTone(220,'square',0.08,0.2,120); }
function sndLevelUp() { [440,550,660,880].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.2,0.5),i*80)); }
function sndWin()     { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.3,0.6),i*120)); }
function sndLose()    { [440,330,220,165].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.3,0.5),i*120)); }

/* \u2500\u2500 8. GAME ACTIONS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
function doJump() {
  if (!P.onGround) return;
  P.vy = P.jumpForce; P.onGround = false; P.state='jump';
  sndJump();
  addFX({ type:'ring', x:P.x+P.w/2, y:P.y+P.h, r:5, maxR:45, life:1, col:'#38d9ff' });
}

function doStrike() {
  if (P.strikeT > 0) return;
  P.strikeT = 26; P.state='strike'; score += 1;
  combo++; comboTimer = 90;
  sndStrike();
  const fx = P.x + (P.facing>0 ? P.w+20 : -20);
  const fy = P.y + 22;
  silenceSparks(fx, fy);
  // Check if Yashas is in range
  const dx = Math.abs((P.x + P.w/2) - (Y.x + Y.w/2));
  const dy = Math.abs((P.y + P.h/2) - (Y.y + Y.h/2));
  if (dx < P.attackRange && dy < 100) {
    const dmg = LEVELS[level].strikeDmg * (1 + (combo>4?0.5:combo>2?0.25:0));
    noise = Math.max(0, noise - dmg);
    Y.state = 'hurt'; Y.stateT = 28; Y.shakeX = 9;
    hitBurst(Y.x+Y.w/2, Y.y+30);
    triggerShake(combo > 3 ? 7 : 4);
    addFloat(Y.x+Y.w/2, Y.y-10, combo>4?'COMBO x'+combo+'!!':'HIT!', combo>4?'#ffd700':'#38d9ff', combo>4?24:18);
    sndHit();
    if (noise <= 0) { noise=0; triggerWin(); }
  } else {
    addFloat(P.x + (P.facing>0?P.w+30:-50), P.y, 'MISS', '#888', 14);
    combo = 0;
  }
}

function doMute() {
  if (muteCD > 0) return;
  P.muteActive = true; P.muteDuration = 180; P.state='mute';
  muteCD = MUTE_CD_MAX;
  slowMotion = true; slowMotionT = 60;
  muteExplosion(P.x+P.w/2, P.y+P.h/2);
  sndMute();
  // Drain noise rapidly
  noise = Math.max(0, noise - 28);
  addFloat(GW/2, GH/2-40, '\ud83d\udd07 MUTE MODE!', '#b06aff', 28);
  if (noise <= 0) { noise=0; triggerWin(); }
}

function doDash() {
  if (dashCD > 0) return;
  dashCD = DASH_CD_MAX; P.dashT = 14;
